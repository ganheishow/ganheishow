<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganhei Show - Sistema Adaptável</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .brand-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .brand-header h1 span { color: var(--accent); }
        .brand-header p { font-size: 14px; color: var(--text-muted); margin-top: 6px; margin-bottom: 30px; }

        .tabs-nav {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .auth-form { display: none; flex-direction: column; gap: 16px; text-align: left; }
        .auth-form.active { display: flex; }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); padding-left: 4px; }
        .form-group input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
        }
        .form-group input:focus { border-color: var(--accent); }

        .btn-submit {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .alert-box {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            margin-bottom: 15px;
        }

        .home-dashboard {
            display: none;
            flex-direction: column;
            gap: 20px;
            margin-top: 10px;
        }
        .balance-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .balance-card p { font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .balance-card h2 { font-size: 32px; color: var(--success); font-weight: 800; margin-top: 5px; }

        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(15, 23, 42, 0.2);
            border-top-color: #0f172a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand-header">
            <h1>Ganhei<span>Show</span></h1>
            <p id="brand-tagline">Encurte links, complete tarefas e fature.</p>
        </div>

        <div id="tabs-container" class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('login')">Entrar</button>
            <button class="tab-btn" onclick="switchTab('register')">Criar Conta</button>
        </div>

        <div id="auth-alert" class="alert-box"></div>

        <!-- FORMULÁRIO DE LOGIN -->
        <form id="login-form" class="auth-form active">
            <div class="form-group">
                <label>Seu E-mail</label>
                <input type="email" id="login-email" placeholder="exemplo@email.com" required>
            </div>
            <div class="form-group">
                <label>Sua Senha</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit" id="login-btn">
                <span>Entrar no App</span>
                <div class="spinner" id="login-spinner"></div>
            </button>
        </form>

        <!-- FORMULÁRIO DE CADASTRO -->
        <form id="register-form" class="auth-form">
            <div class="form-group">
                <label>E-mail de Cadastro</label>
                <input type="email" id="register-email" placeholder="exemplo@email.com" required>
            </div>
            <div class="form-group">
                <label>Escolha uma Senha</label>
                <input type="password" id="register-password" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="form-group">
                <label>Código de Convite (Opcional)</label>
                <input type="text" id="register-ref" placeholder="Caso possua um indicador">
            </div>
            <button type="submit" class="btn-submit" id="register-btn">
                <span>Cadastrar Tudo e Entrar</span>
                <div class="spinner" id="register-spinner"></div>
            </button>
        </form>

        <!-- TELA INICIAL COM SALDO E BOTÃO -->
        <div id="home-dashboard" class="home-dashboard">
            <div class="balance-card">
                <p>Seu Saldo Disponível</p>
                <h2>R$ <span id="user-balance-display">0.000</span></h2>
            </div>
            <button class="btn-submit" id="earn-balance-btn" onclick="earnBalance()">
                <span>⚡ Ganhar Saldo (Encurtador)</span>
            </button>
            <p style="font-size: 11px; color: var(--text-muted); cursor: pointer; text-decoration: underline; margin-top: 5px;" onclick="window.location.reload()">Desconectar</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6URoPssZemFyTDU_0u1bAHyhimk4f2d0",
            authDomain: "ganheishow.firebaseapp.com",
            databaseURL: "https://ganheishow-default-rtdb.firebaseio.com",
            projectId: "ganheishow",
            storageBucket: "ganheishow.firebasestorage.app",
            messagingSenderId: "458543082047",
            appId: "1:458543082047:web:d4c7fd8f91001315dee68a",
            measurementId: "G-ZQ5CRQ05YR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let currentLoggedUid = null;

        window.switchTab = function(type) {
            showAlert('', false);
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if(type === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        function showAlert(msg, isVisible = true, isSuccess = false) {
            const alertBox = document.getElementById('auth-alert');
            alertBox.innerText = msg;
            alertBox.style.display = isVisible ? 'block' : 'none';
            alertBox.style.background = isSuccess ? 'rgba(16, 185, 129, 0.15)' : 'rgba(239, 68, 68, 0.15)';
            alertBox.style.borderColor = isSuccess ? 'var(--success)' : 'var(--danger)';
        }

        function toggleLoading(btnId, spinnerId, isLoading) {
            document.getElementById(btnId).disabled = isLoading;
            document.getElementById(spinnerId).style.display = isLoading ? 'inline-block' : 'none';
        }

        function generateDeviceUID() {
            let uid = localStorage.getItem('ganheishow_device_uid');
            if (!uid) {
                uid = 'gs_dev_' + Math.random().toString(36).substring(2, 12).toUpperCase() + '_' + Date.now();
                localStorage.setItem('ganheishow_device_uid', uid);
            }
            return uid;
        }

        function loadDashboardInterface(uid) {
            currentLoggedUid = uid;
            document.getElementById('tabs-container').style.display = 'none';
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('brand-tagline').innerText = "Área Interna do Usuário";
            document.getElementById('home-dashboard').style.display = 'flex';

            onValue(ref(database, `users/${uid}/balance`), (snap) => {
                const val = snap.val() || 0.000;
                document.getElementById('user-balance-display').innerText = val.toFixed(3);
            });
        }

        // REDIRECIONAMENTO CORRETO PARA A TELA DE ANÚNCIOS
        window.earnBalance = function() {
            window.location.href = 'tarefa.html';
        }

        // LOGIN
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            showAlert('', false);
            toggleLoading('login-btn', 'login-spinner', true);
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                toggleLoading('login-btn', 'login-spinner', false);
                loadDashboardInterface(userCredential.user.uid);
            } catch (error) {
                toggleLoading('login-btn', 'login-spinner', false);
                showAlert('Erro ao autenticar: Credenciais inválidas.');
            }
        });

        // CADASTRO ENVIANDO TODOS OS METADADOS POSSÍVEIS
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            showAlert('', false);
            toggleLoading('register-btn', 'register-spinner', true);

            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const refCodeInput = document.getElementById('register-ref').value.trim().toUpperCase();

            try {
                let geoData = {};
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    geoData = await res.json();
                } catch(err) {
                    geoData = { ip: "0.0.0.0", city: "Não identificada", region: "N/D", country_name: "Brasil", org: "Desconhecido" };
                }

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                const seuCodRef = Math.random().toString(36).substring(2, 7).toUpperCase();

                const superPayload = {
                    uid: user.uid,
                    email: user.email,
                    balance: 0.000,
                    is_vip: false,
                    referral_code: seuCodRef,
                    indicado_por: refCodeInput || 'Ninguém',
                    criado_em: new Date().toISOString(),
                    device_uid: generateDeviceUID(),
                    ip_cadastro: geoData.ip || "0.0.0.0",
                    provedor_internet: geoData.org || "Desconhecido",
                    localizacao: {
                        cidade: geoData.city || "N/A",
                        estado: geoData.region || "N/A",
                        pais: geoData.country_name || "Brasil",
                        fuso_horario: geoData.timezone || "America/Sao_Paulo"
                    },
                    metadados_aparelho: {
                        user_agent_completo: navigator.userAgent,
                        plataforma: navigator.platform || "Desconhecida",
                        idioma_sistema: navigator.language || "pt-BR",
                        resolucao_tela: `${window.screen.width}x${window.screen.height}`,
                    }
                };

                await set(ref(database, 'users/' + user.uid), superPayload);
                toggleLoading('register-btn', 'register-spinner', false);
                showAlert('Conta configurada e metadados salvos!', true, true);
                
                setTimeout(() => { loadDashboardInterface(user.uid); }, 1000);
            } catch (error) {
                toggleLoading('register-btn', 'register-spinner', false);
                showAlert('Erro no registro: ' + error.message);
            }
        });
    </script>
</body>
</html>
